{{ block content }}
<div style="text-align: center; padding: 60px 20px; min-height: 60vh; display: flex; align-items: center; justify-content: center;">
    <div style="background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); padding: 60px 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); max-width: 700px; border: 2px solid #667eea;">
        <div style="font-size: 60px; margin-bottom: 30px;">
            🤝
        </div>
        <h1 style="color: #2d3748; font-size: 36px; margin-bottom: 20px; font-weight: bold;">
            交渉ゲームへようこそ
        </h1>
        <p style="color: #4a5568; font-size: 18px; line-height: 1.8; margin-bottom: 30px;">
            これから交渉ゲームを開始します。<br>
            各ラウンドで最適な提案を考えて、<br>
            できるだけ多くのポイントを獲得しましょう！
        </p>
        <div style="background-color: rgba(255, 255, 255, 0.8); padding: 20px; border-radius: 10px; margin-top: 30px; border-left: 4px solid #667eea;">
            <p style="color: #2d3748; font-size: 16px; margin: 0;">
                💡 <strong>ヒント：</strong>各ステージで割引率が変化します。タイミングを見極めて交渉しましょう。
            </p>
        </div>
    </div>
</div>

<div style="text-align: center; margin-top: 30px;">
    <button class="otree-btn-next btn btn-primary" style="font-size: 18px; padding: 12px 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 25px; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);">
        スタート →
    </button>
</div>
{{ endblock }}
