{{ block scripts }}
<script>
function checkSliders() {
    const rangeValue = document.getElementById('rangeValue').innerText;
    const rangeValue2 = document.getElementById('rangeValue2').innerText;
    const rangeValue3 = document.getElementById('rangeValue3').innerText;
    const rangeValue4 = document.getElementById('rangeValue4').innerText;
    const rangeValue5 = document.getElementById('rangeValue5').innerText;
    const rangeValue6 = document.getElementById('rangeValue6').innerText;
    const rangeValue7 = document.getElementById('rangeValue7').innerText;
    const nextButton = document.getElementById('nextButton');
    
    // Check if either of the span elements is showing "?"
    if (rangeValue !== "?" && rangeValue2 !== "?" && rangeValue3 !== "?" && rangeValue4 !== "?" && rangeValue5 !== "?" && rangeValue6 !== "?"&& rangeValue7 !== "?") {
        nextButton.disabled = false;
    } else {
        nextButton.disabled = true;
    }
}
</script>
